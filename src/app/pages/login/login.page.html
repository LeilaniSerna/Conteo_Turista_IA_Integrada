<ion-content class="login-background">
  <div class="login-container">
    
    <div class="form-card">
      <div class="top-banner">
        Contador turistico
      </div>

      <div class="form-content">
        
        <div class="input-group">
          <label class="input-label">Correo:</label>
          <div class="custom-input-wrapper">
            <ion-icon name="person-outline"></ion-icon>
            <ion-input type="email" placeholder="correo@gmail.com" [(ngModel)]="email"></ion-input>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">Contrasenia:</label>
          <div class="custom-input-wrapper">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <ion-input type="password" placeholder="••••••••" [(ngModel)]="password"></ion-input>
            <ion-icon name="eye-outline" class="eye-icon"></ion-icon>
          </div>
        </div>

        <ion-button expand="block" class="login-btn" (click)="handleAuth()">
          Iniciar sesion <ion-icon name="chevron-forward-outline"></ion-icon>
        </ion-button>

      </div>

      <div class="footer-security">
        <p>Si necesitas agregar un nuevo usuario consulta al 495495495</p>
      </div>
    </div>

  </div>
</ion-content>
